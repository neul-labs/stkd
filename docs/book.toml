[book]
authors = ["Stack Contributors"]
language = "en"
multilingual = false
src = "src"
title = "Stack - Stacked Diffs for Git"
description = "A CLI tool for managing stacked pull requests in Git repositories"

[build]
build-dir = "book"
create-missing = false

[output.html]
git-repository-url = "https://github.com/neul-labs/stkd"
edit-url-template = "https://github.com/neul-labs/stkd/edit/main/docs/{path}"
default-theme = "rust"
preferred-dark-theme = "coal"
smart-punctuation = true

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
limit-results = 30
teaser-word-count = 30
use-hierarchical-headings = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3
copy-js = true

[preprocessor.links]

[preprocessor.index]
