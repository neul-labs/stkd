name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Build release binaries for all platforms
  # ---------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: gt
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: gt
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: gt.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p stkd-cli

      - name: Strip binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          strip target/${{ matrix.target }}/release/${{ matrix.binary }} || true

      - name: Package binary
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          DIR="gt-${VERSION}-${{ matrix.target }}"
          mkdir -p "$DIR"
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} "$DIR/"
          cp README.md LICENSE "$DIR/" 2>/dev/null || true
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            7z a "${DIR}.zip" "$DIR"
            echo "ASSET=${DIR}.zip" >> "$GITHUB_ENV"
          else
            tar czf "${DIR}.tar.gz" "$DIR"
            echo "ASSET=${DIR}.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gt-${{ matrix.target }}
          path: gt-*

  # ---------------------------------------------------------------------------
  # Create GitHub Release and attach binaries
  # ---------------------------------------------------------------------------
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: gt-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/gt-*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}

  # ---------------------------------------------------------------------------
  # Publish workspace crates to crates.io
  # ---------------------------------------------------------------------------
  publish-crates:
    name: Publish to crates.io
    needs: release
    if: github.repository == 'neul-labs/stkd'
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Update workspace version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/^version = \"[^\"]*\"/version = \"${VERSION}\"/" Cargo.toml

      - name: Authenticate with crates.io
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          set -e
          # Publish order respects inter-crate dependencies
          for crate in stkd-provider-api stkd-core stkd-db stkd-github stkd-gitlab stkd-engine stkd-tui stkd-cli stkd-server stkd-mcp; do
            echo "Publishing $crate..."
            cargo publish -p "$crate" --allow-dirty --no-verify
            # Wait for the registry to index the crate before dependents are published
            sleep 20
          done

  # ---------------------------------------------------------------------------
  # Publish npm package
  # ---------------------------------------------------------------------------
  publish-npm:
    name: Publish to npm
    needs: release
    if: github.repository == 'neul-labs/stkd'
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Ensure latest npm
        run: npm install -g npm@latest

      - name: Update npm version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cd packages/npm/stkd-cli
          npm version "$VERSION" --no-git-tag-version

      - name: Publish npm package
        run: cd packages/npm/stkd-cli && npm publish --provenance --access public

  # ---------------------------------------------------------------------------
  # Publish PyPI package
  # ---------------------------------------------------------------------------
  publish-pypi:
    name: Publish to PyPI
    needs: release
    if: github.repository == 'neul-labs/stkd'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip build

      - name: Update PyPI version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cd packages/pypi/stkd-cli
          sed -i "s/version=.*/version=\"$VERSION\",/" setup.py

      - name: Build PyPI package
        run: cd packages/pypi/stkd-cli && python -m build

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/pypi/stkd-cli/dist

  # ---------------------------------------------------------------------------
  # Update Homebrew formula in neul-labs/homebrew-tap
  # ---------------------------------------------------------------------------
  update-homebrew-tap:
    name: Update Homebrew Formula
    needs: release
    if: github.repository == 'neul-labs/stkd'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: gt-*
          merge-multiple: true

      - name: Compute SHA256s for prebuilt binaries
        id: sha256
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          for f in artifacts/*.tar.gz; do
            sha=$(sha256sum "$f" | awk '{print $1}')
            target=$(basename "$f" | sed "s/gt-${VERSION}-//;s/\.tar\.gz//")
            echo "${target}=${sha}" >> "$GITHUB_OUTPUT"
            echo "${target}=${sha}"
          done

      - name: Compute SHA256 for source tarball
        id: source_sha256
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          curl -sL "https://github.com/neul-labs/stkd/archive/refs/tags/v${VERSION}.tar.gz" | sha256sum | awk '{print "sha=" $1}' >> "$GITHUB_OUTPUT"

      - name: Clone homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: neul-labs/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        env:
          VERSION: ${{ github.ref_name }}
          SHA256_LINUX: ${{ steps.sha256.outputs.x86_64-unknown-linux-gnu }}
          SHA256_MACOS_ARM: ${{ steps.sha256.outputs.aarch64-apple-darwin }}
          SHA256_SOURCE: ${{ steps.source_sha256.outputs.sha }}
        run: |
          VERSION=${VERSION#v}
          FORMULA="homebrew-tap/Formula/stkd.rb"

          # Update version
          sed -i "s/version \"[^\"]*\"/version \"${VERSION}\"/" "$FORMULA"

          # Update macOS ARM64 URL and SHA256
          sed -i "s|url \"https://github.com/neul-labs/stkd/releases/download/v[^/]*/gt-[^\"]*-aarch64-apple-darwin.tar.gz\"|url \"https://github.com/neul-labs/stkd/releases/download/v${VERSION}/gt-${VERSION}-aarch64-apple-darwin.tar.gz\"|" "$FORMULA"
          sed -i "/aarch64-apple-darwin/{n;s/sha256 \"[^\"]*\"/sha256 \"${SHA256_MACOS_ARM}\"/}" "$FORMULA"

          # Update Linux x86_64 URL and SHA256
          sed -i "s|url \"https://github.com/neul-labs/stkd/releases/download/v[^/]*/gt-[^\"]*-x86_64-unknown-linux-gnu.tar.gz\"|url \"https://github.com/neul-labs/stkd/releases/download/v${VERSION}/gt-${VERSION}-x86_64-unknown-linux-gnu.tar.gz\"|" "$FORMULA"
          sed -i "/x86_64-unknown-linux-gnu/{n;s/sha256 \"[^\"]*\"/sha256 \"${SHA256_LINUX}\"/}" "$FORMULA"

          # Update Intel macOS source URL and SHA256
          sed -i "s|url \"https://github.com/neul-labs/stkd/archive/refs/tags/v[^\"]*.tar.gz\"|url \"https://github.com/neul-labs/stkd/archive/refs/tags/v${VERSION}.tar.gz\"|" "$FORMULA"
          sed -i "/archive\/refs\/tags\/v.*\.tar\.gz/{n;s/sha256 \"[^\"]*\"/sha256 \"${SHA256_SOURCE}\"/}" "$FORMULA"

      - name: Commit and push
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/stkd.rb
          if git diff --cached --quiet; then
            echo "No changes to formula"
          else
            git commit -m "stkd ${VERSION}"
            git push origin main
          fi
