name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Build release binaries for all platforms
  # ---------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: gt
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: gt
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: gt.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p stkd-cli

      - name: Strip binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          strip target/${{ matrix.target }}/release/${{ matrix.binary }} || true

      - name: Package binary
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          DIR="gt-${VERSION}-${{ matrix.target }}"
          mkdir -p "$DIR"
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} "$DIR/"
          cp README.md LICENSE "$DIR/" 2>/dev/null || true
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            7z a "${DIR}.zip" "$DIR"
            echo "ASSET=${DIR}.zip" >> "$GITHUB_ENV"
          else
            tar czf "${DIR}.tar.gz" "$DIR"
            echo "ASSET=${DIR}.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gt-${{ matrix.target }}
          path: gt-*

  # ---------------------------------------------------------------------------
  # Create GitHub Release and attach binaries
  # ---------------------------------------------------------------------------
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: gt-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/gt-*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}

  # ---------------------------------------------------------------------------
  # Publish npm package
  # ---------------------------------------------------------------------------
  publish-npm:
    name: Publish to npm
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cd npm/stkd-cli
          npm version "$VERSION" --no-git-tag-version

      - name: Publish npm package
        run: cd npm/stkd-cli && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ---------------------------------------------------------------------------
  # Publish PyPI package
  # ---------------------------------------------------------------------------
  publish-pypi:
    name: Publish to PyPI
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip build twine

      - name: Update PyPI version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cd pypi/stkd-cli
          sed -i "s/version=.*/version=\"$VERSION\",/" setup.py

      - name: Build PyPI package
        run: cd pypi/stkd-cli && python -m build

      - name: Publish to PyPI
        run: cd pypi/stkd-cli && twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
